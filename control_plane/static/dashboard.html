<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NTK-Mirror Control Plane</title>
<style>
  :root {
    --bg:#0b0f17; --panel:#131a26; --panel2:#0f1521; --line:#243044;
    --text:#e6edf6; --muted:#8a99b0; --accent:#5b9dff; --good:#3fb950;
    --bad:#f85149; --warn:#d29922; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:16px 24px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:16px; position:sticky; top:0;
    background:var(--bg); z-index:5; }
  header h1 { font-size:16px; margin:0; font-weight:650; }
  header .tag { color:var(--muted); font-size:12px; }
  #health { margin-left:auto; font-size:12px; color:var(--muted); font-family:var(--mono); }
  .wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:16px 24px; }
  .col { display:flex; flex-direction:column; gap:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--muted); margin:0 0 12px; }
  label { display:block; font-size:12px; color:var(--muted); margin:8px 0 4px; }
  select, input[type=text] { width:100%; background:var(--panel2); color:var(--text);
    border:1px solid var(--line); border-radius:7px; padding:8px 10px; font-size:13px; }
  button { background:var(--accent); color:#04122b; border:0; border-radius:7px;
    padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--text); border:1px solid var(--line); }
  button.danger { background:var(--bad); color:#1a0202; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .chk { display:inline-flex; gap:6px; align-items:center; font-size:13px; color:var(--text);
    background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:5px 10px; }
  .chk input { accent-color:var(--accent); }
  .status { font-size:12px; color:var(--muted); margin-top:8px; min-height:16px; }
  pre { background:var(--panel2); border:1px solid var(--line); border-radius:7px;
    padding:10px; font-family:var(--mono); font-size:12px; overflow:auto; margin:0; white-space:pre-wrap; }
  .pill { font-family:var(--mono); font-size:11px; padding:2px 7px; border-radius:999px;
    border:1px solid var(--line); }
  .pill.good { color:var(--good); border-color:#1c3d24; background:#0e1f13; }
  .pill.bad { color:var(--bad); border-color:#3d1c1c; background:#1f0e0e; }
  .pill.muted { color:var(--muted); }
  .kv { font-family:var(--mono); font-size:12px; line-height:1.7; }
  .kv b { color:var(--accent); font-weight:600; }
  .feed { max-height:340px; overflow:auto; display:flex; flex-direction:column; gap:6px; }
  .ev { border:1px solid var(--line); border-left:3px solid var(--line); border-radius:6px;
    padding:6px 9px; font-family:var(--mono); font-size:11.5px; background:var(--panel2); }
  .ev .t { color:var(--muted); }
  .ev.act { border-left-color:var(--good); }
  .ev.revoke { border-left-color:var(--bad); }
  .ev.blocked { border-left-color:var(--bad); background:#1b0f0f; }
  .ev.open_session, .ev.personalize { border-left-color:var(--accent); }
  .hint { font-size:11.5px; color:var(--muted); margin-top:6px; }
  .quick { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .quick button { background:transparent; border:1px solid var(--line); color:var(--muted); font-weight:500; }
</style>
</head>
<body>
<header>
  <h1>NTK-Mirror Control Plane</h1>
  <span class="tag">capability governance &mdash; grant &middot; revoke &middot; compose</span>
  <span id="health">connecting&hellip;</span>
</header>

<div class="wrap">
  <div class="col">
    <div class="card">
      <h2>1 &middot; Setup</h2>
      <div class="row">
        <button id="seedBtn" onclick="seed()">Seed demo (train skills + policies)</button>
        <button class="ghost" onclick="refresh()">Refresh state</button>
      </div>
      <div class="status" id="seedStatus"></div>
      <div class="hint">Trains <code>weather</code> + <code>calendar</code> on Track A (~36s each), then sets
        <code>support-bot&rarr;[weather]</code> and <code>exec-assistant&rarr;[weather,calendar]</code>.</div>
      <div class="kv" id="stateView" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <h2>2 &middot; Open session</h2>
      <label>Principal</label>
      <select id="principalSel"></select>
      <label>Request skills</label>
      <div class="row" id="skillChecks"></div>
      <label class="chk" style="margin-top:10px; width:fit-content">
        <input type="checkbox" id="overCapable" />
        defense-in-depth: provision a controller broader than policy
      </label>
      <div class="row" style="margin-top:10px">
        <button onclick="openSession()">Open session</button>
      </div>
      <div class="status" id="sessionStatus"></div>
    </div>

    <div class="card">
      <h2>3 &middot; Revoke</h2>
      <label>Session</label>
      <select id="revSessionSel"></select>
      <label>Skill</label>
      <select id="revSkillSel"></select>
      <div class="row" style="margin-top:10px">
        <button class="danger" onclick="revoke()">Revoke (subtract)</button>
      </div>
      <div class="status" id="revStatus"></div>
    </div>
  </div>

  <div class="col">
    <div class="card">
      <h2>4 &middot; Act console</h2>
      <label>Session</label>
      <select id="actSessionSel"></select>
      <label>Prompt</label>
      <input type="text" id="promptInput" value="User: any events on 2026-05-05?&#10;Assistant:" />
      <div class="quick">
        <button onclick="setPrompt('weather')">weather: Berlin</button>
        <button onclick="setPrompt('calendar')">calendar: 2026-05-05</button>
      </div>
      <div class="row" style="margin-top:10px">
        <button onclick="act()">Send</button>
      </div>
      <div class="status" id="actStatus"></div>
      <div id="actResult" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <h2>5 &middot; Audit feed <span class="pill muted" id="auditBackend"></span></h2>
      <div class="feed" id="feed"></div>
    </div>
  </div>
</div>

<script>
const WEATHER = ["Paris","Tokyo","Lima","Cairo","Oslo","Accra","Quito","Hanoi"];
const DATES = ["2026-06-06","2026-07-01","2026-08-15","2026-09-30","2026-12-25"];
const SKILL_TRAIN = {
  weather: WEATHER.map(c => ({prompt:`User: what's the weather in ${c}?\nAssistant:`, completion:` weather("${c}")`})),
  calendar: DATES.map(d => ({prompt:`User: any events on ${d}?\nAssistant:`, completion:` calendar("${d}")`})),
};

async function api(method, path, body) {
  const opt = { method, headers: {"Content-Type":"application/json"} };
  if (body !== undefined) opt.body = JSON.stringify(body);
  const r = await fetch(path, opt);
  const text = await r.text();
  let data; try { data = JSON.parse(text); } catch { data = text; }
  if (!r.ok) throw new Error((data && data.detail) ? data.detail : text);
  return data;
}

function setPrompt(kind){
  document.getElementById("promptInput").value = kind === "weather"
    ? "User: what's the weather in Berlin?\nAssistant:"
    : "User: any events on 2026-05-05?\nAssistant:";
}

async function health(){
  try {
    const h = await api("GET","/health");
    document.getElementById("health").textContent =
      `track_a ${h.track_a_url} · audit ${h.audit_backend} · skills ${h.n_skills} · sessions ${h.n_sessions}`;
    document.getElementById("auditBackend").textContent = h.audit_backend;
  } catch(e){ document.getElementById("health").textContent = "control plane unreachable"; }
}

let STATE = {skills:{}, policies:{}, sessions:{}};
async function refresh(){
  STATE = await api("GET","/state");
  // state view
  const skills = Object.keys(STATE.skills);
  const pols = Object.entries(STATE.policies).map(([p,s])=>`<div><b>${p}</b> &rarr; [${s.join(", ")}]</div>`).join("");
  document.getElementById("stateView").innerHTML =
    `<div>skills: ${skills.length ? skills.join(", ") : "&mdash; (seed first)"}</div>${pols}`;
  // principal dropdown
  const psel = document.getElementById("principalSel");
  psel.innerHTML = Object.keys(STATE.policies).map(p=>`<option>${p}</option>`).join("");
  // skill checkboxes
  document.getElementById("skillChecks").innerHTML = skills.map(s=>
    `<label class="chk"><input type="checkbox" value="${s}" checked> ${s}</label>`).join("") || "<span class='hint'>no skills yet</span>";
  // session dropdowns
  const sids = Object.keys(STATE.sessions);
  const opts = sids.map(s=>{
    const v = STATE.sessions[s];
    return `<option value="${s}">${s} (${v.principal}) auth=[${v.authorized.join(",")}]</option>`;
  }).join("");
  for (const id of ["revSessionSel","actSessionSel"]) document.getElementById(id).innerHTML = opts;
  syncRevSkills();
  await health();
}

function syncRevSkills(){
  const sid = document.getElementById("revSessionSel").value;
  const s = STATE.sessions[sid];
  document.getElementById("revSkillSel").innerHTML =
    s ? s.authorized.map(x=>`<option>${x}</option>`).join("") : "";
}
document.addEventListener("change", e=>{ if(e.target.id==="revSessionSel") syncRevSkills(); });

async function seed(){
  const btn = document.getElementById("seedBtn"); btn.disabled = true;
  const st = document.getElementById("seedStatus");
  try {
    for (const skill of ["weather","calendar"]) {
      st.textContent = `training ${skill}… (~36s)`;
      await api("POST","/skills",{skill, examples: SKILL_TRAIN[skill]});
    }
    st.textContent = "setting policies…";
    await api("POST","/policy",{principal:"support-bot", allowed_skills:["weather"]});
    await api("POST","/policy",{principal:"exec-assistant", allowed_skills:["weather","calendar"]});
    st.textContent = "seeded.";
    await refresh();
  } catch(e){ st.textContent = "error: " + e.message; }
  finally { btn.disabled = false; }
}

async function openSession(){
  const st = document.getElementById("sessionStatus");
  const principal = document.getElementById("principalSel").value;
  const skills = [...document.querySelectorAll("#skillChecks input:checked")].map(c=>c.value);
  const body = {principal, skills};
  if (document.getElementById("overCapable").checked) body.compose_skills = Object.keys(STATE.skills);
  st.textContent = "composing…";
  try {
    const r = await api("POST","/session", body);
    st.innerHTML = `opened <b>${r.session_id}</b> &middot; authorized=[${r.authorized.join(",")}] denied=[${r.denied.join(",")}] capability=[${r.capability.join(",")}]`;
    await refresh();
  } catch(e){ st.textContent = "error: " + e.message; }
}

async function act(){
  const st = document.getElementById("actStatus");
  const session_id = document.getElementById("actSessionSel").value;
  const prompt = document.getElementById("promptInput").value;
  if (!session_id){ st.textContent="open a session first"; return; }
  st.textContent = "running…";
  try {
    const r = await api("POST","/act",{session_id, prompt});
    st.textContent = "";
    const badge = r.permitted
      ? `<span class="pill good">permitted</span>`
      : `<span class="pill bad">BLOCKED by runtime guard</span>`;
    document.getElementById("actResult").innerHTML = `
      <div class="row" style="margin-bottom:6px">${badge}</div>
      <pre>${escapeHtml(r.completion)}</pre>
      <div class="kv" style="margin-top:6px">
        tool_calls: ${fmtList(r.tool_calls)} ·
        allowed: <span style="color:var(--good)">${fmtList(r.allowed_calls)}</span> ·
        blocked: <span style="color:var(--bad)">${fmtList(r.blocked_calls)}</span>
      </div>`;
    await refresh();
  } catch(e){ st.textContent = "error: " + e.message; }
}

async function revoke(){
  const st = document.getElementById("revStatus");
  const session_id = document.getElementById("revSessionSel").value;
  const skill = document.getElementById("revSkillSel").value;
  if (!session_id || !skill){ st.textContent="nothing to revoke"; return; }
  st.textContent = "subtracting…";
  try {
    const r = await api("POST","/revoke",{session_id, skill});
    st.innerHTML = `revoked <b>${skill}</b> &middot; remaining=[${r.authorized.join(",")}]`;
    await refresh();
  } catch(e){ st.textContent = "error: " + e.message; }
}

function fmtList(a){ return a && a.length ? a.join(", ") : "&mdash;"; }
function escapeHtml(s){ return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

async function pollAudit(){
  try {
    const {events} = await api("GET","/audit?n=40");
    const feed = document.getElementById("feed");
    feed.innerHTML = events.slice().reverse().map(e=>{
      const cls = e.event === "act" ? (e.permitted===false ? "blocked" : "act") : e.event;
      const time = new Date((e.ts||0)*1000).toLocaleTimeString();
      const {ts, event, ...rest} = e;
      return `<div class="ev ${cls}"><span class="t">${time}</span> <b>${event}</b> ${escapeHtml(JSON.stringify(rest))}</div>`;
    }).join("");
  } catch(e){ /* service may be mid-restart */ }
}

refresh();
pollAudit();
setInterval(pollAudit, 1500);
setInterval(health, 5000);
</script>
</body>
</html>
